server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: task-manager-pro
  profiles:
    default: dev
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8081/realms/task-manager}

app:
  security:
    oauth2:
      client-id: ${APP_SECURITY_OAUTH2_CLIENT_ID:task-manager-api}
  exports:
    storage-dir: ${APP_EXPORTS_STORAGE_DIR:target/exports}
  reminders:
    due-window: ${APP_REMINDERS_DUE_WINDOW:PT15M}
    enqueue-fixed-delay-ms: ${APP_REMINDERS_ENQUEUE_FIXED_DELAY_MS:60000}
    dispatch-fixed-delay-ms: ${APP_REMINDERS_DISPATCH_FIXED_DELAY_MS:5000}
    dispatch-batch-size: ${APP_REMINDERS_DISPATCH_BATCH_SIZE:100}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  paths-to-match: /api/v1/**
  swagger-ui:
    path: /swagger-ui.html
